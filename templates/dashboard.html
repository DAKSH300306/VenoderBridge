{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-3 mb-4">

        <div class="card shadow">

            <div class="card-body">

                <h6>Total Vendors</h6>

                <h2>{{ total_vendors }}</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-4">

        <div class="card shadow">

            <div class="card-body">

                <h6>Active RFQs</h6>

                <h2>{{ total_rfqs }}</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-4">

        <div class="card shadow">

            <div class="card-body">

                <h6>Pending Approvals</h6>

                <h2>0</h2>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-4">

        <div class="card shadow">

            <div class="card-body">

                <h6>Total Invoices</h6>

                <h2>0</h2>

            </div>

        </div>

    </div>

</div>


<div class="row">

    <div class="col-md-8">

        <div class="card shadow">

            <div class="card-header">
                Recent Activities
            </div>

            <div class="card-body">

                <table class="table">

                    <thead>

                        <tr>
                            <th>ID</th>
                            <th>Activity</th>
                            <th>Status</th>
                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>RFQ001</td>

                            <td>Vendor Registration</td>

                            <td>
                                <span class="badge bg-success">
                                    Completed
                                </span>
                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>


    <div class="col-md-4">

        <div class="card shadow">

            <div class="card-header">
                Quick Actions
            </div>

            <div class="card-body d-grid gap-2">

                <a href="/add_vendor"
                   class="btn btn-primary">

                    Add Vendor

                </a>

                <a href="/vendors"
                   class="btn btn-success">

                    View Vendors

                </a>

                <a href="/create_rfq"
                    class="btn btn-warning">

                    Create RFQ

                </a>

                <button class="btn btn-danger">

                    Generate Invoice

                </button>

            </div>

        </div>

    </div>

</div>

{% endblock %}
