{% extends 'base.html' %}

{% block content %}

<h2>Edit Vendor</h2>

<div class="card shadow">

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label>Vendor Name</label>
                <input
                    type="text"
                    name="vendor_name"
                    value="{{ vendor.vendor_name }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ vendor.email }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input
                    type="text"
                    name="phone"
                    value="{{ vendor.phone }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Category</label>
                <input
                    type="text"
                    name="category"
                    value="{{ vendor.category }}"
                    class="form-control">
            </div>

            <button
                type="submit"
                class="btn btn-success">

                Update Vendor

            </button>

        </form>

    </div>

</div>

{% endblock %}
