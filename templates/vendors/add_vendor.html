{% extends 'base.html' %}

{% block content %}

<h2>Add Vendor</h2>

<div class="card shadow border-0">

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label>Vendor Name</label>

                <input
                    type="text"
                    name="vendor_name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>GST Number</label>

                <input
                    type="text"
                    name="gst_number"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>Category</label>

                <select
                    name="category"
                    class="form-control">

                    <option>Hardware</option>
                    <option>Software</option>
                    <option>Services</option>

                </select>

            </div>

            <button
                type="submit"
                class="btn btn-success">

                Save Vendor

            </button>

        </form>

    </div>

</div>

{% endblock %}
