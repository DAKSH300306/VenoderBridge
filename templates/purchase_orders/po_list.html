{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2>Purchase Orders</h2>

</div>

<div class="card shadow">

    <div class="card-body">

        <input
            type="text"
            id="poSearch"
            class="form-control mb-3"
            placeholder="Search Purchase Order...">

        <table class="table table-hover" id="poTable">

            <thead class="table-light">

                <tr>

                    <th>PO Number</th>
                    <th>Vendor</th>
                    <th>RFQ</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                {% for po in purchase_orders %}

                <tr>

                    <td>

                        <strong>

                            {{ po.po_number }}

                        </strong>

                    </td>

                    <td>

                        {{ po.approval.quotation.vendor.vendor_name }}

                    </td>

                    <td>

                        {{ po.approval.quotation.rfq.title }}

                    </td>

                    <td>

                        <span class="badge bg-success">

                            {{ po.status }}

                        </span>

                    </td>

                    <td>

                        <a href="/generate_invoice/{{ po.id }}"
                           class="btn btn-dark btn-sm">

                            <i class="fa-solid fa-file-invoice"></i>

                            Generate Invoice

                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script>

document.getElementById("poSearch")
.addEventListener("keyup", function() {

    let filter = this.value.toLowerCase();

    let rows =
    document.querySelectorAll("#poTable tbody tr");

    rows.forEach(row => {

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(filter)
        ? ""
        : "none";

    });

});

</script>

{% endblock %}
