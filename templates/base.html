<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            margin:0;
            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;
        }

        .sidebar{
            width:260px;
            height:100vh;
            background:#0f172a;
            position:fixed;
            left:0;
            top:0;
            overflow-y:auto;
        }

        .logo{
            color:white;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            padding:20px;
            border-bottom:1px solid #1e293b;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#1e293b;
            color:white;
        }

        .sidebar i{
            margin-right:10px;
        }

        .content{
            margin-left:260px;
            padding:25px;
        }

        .topbar{
            background:white;
            border-radius:12px;
            padding:15px 20px;
            margin-bottom:25px;
            box-shadow:0px 2px 10px rgba(0,0,0,0.08);
        }

        .topbar h4{
            margin:0;
        }

        .card{
            border:none;
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        VendorBridge
    </div>

    <a href="/">
        <i class="fa-solid fa-chart-line"></i>
        Dashboard
    </a>

    <a href="/vendors">
        <i class="fa-solid fa-users"></i>
        Vendors
    </a>

    <a href="/add_vendor">
        <i class="fa-solid fa-user-plus"></i>
        Add Vendor
    </a>

    <a href="/rfqs">
        <i class="fa-solid fa-file-contract"></i>
        RFQs
    </a>

    <a href="/create_rfq">
        <i class="fa-solid fa-plus"></i>
        Create RFQ
    </a>

    <a href="#">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        Quotations
    </a>

    <a href="#">
        <i class="fa-solid fa-check"></i>
        Approvals
    </a>

    <a href="#">
        <i class="fa-solid fa-cart-shopping"></i>
        Purchase Orders
    </a>

    <a href="#">
        <i class="fa-solid fa-receipt"></i>
        Invoices
    </a>

</div>

<div class="content">

    <div class="topbar">
        <h4>Procurement & Vendor Management ERP</h4>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
