<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VendorBridge ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        body{
            background:#f4f6f9;
            margin:0;
            font-family:Segoe UI, sans-serif;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#1e293b;
            position:fixed;
            left:0;
            top:0;
            color:white;
        }

        .sidebar h3{
            padding:20px;
            text-align:center;
            border-bottom:1px solid #334155;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:.3s;
        }

        .sidebar a:hover{
            background:#334155;
        }

        .content{
            margin-left:250px;
            padding:25px;
        }

        .topbar{
            background:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h3>VendorBridge</h3>

        <a href="/">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="fa-solid fa-users"></i>
            Vendors
        </a>

        <a href="#">
            <i class="fa-solid fa-file-contract"></i>
            RFQs
        </a>

        <a href="#">
            <i class="fa-solid fa-file-invoice-dollar"></i>
            Quotations
        </a>

        <a href="#">
            <i class="fa-solid fa-check"></i>
            Approvals
        </a>

        <a href="#">
            <i class="fa-solid fa-cart-shopping"></i>
            Purchase Orders
        </a>

        <a href="#">
            <i class="fa-solid fa-receipt"></i>
            Invoices
        </a>

    </div>

    <div class="content">

        <div class="topbar">

            <h4>VendorBridge Procurement ERP</h4>

        </div>

        {% block content %}
        {% endblock %}

    </div>

</body>

</html>
