{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">

Create Account

</h2>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
class="form-control mb-3">

<input
type="email"
name="email"
placeholder="Email"
class="form-control mb-3">

<input
type="password"
name="password"
placeholder="Password"
class="form-control mb-3">

<select
name="role"
class="form-control mb-3">

<option>Admin</option>
<option>Manager</option>
<option>Vendor</option>

</select>

<button
class="btn btn-success w-100">

Register

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
