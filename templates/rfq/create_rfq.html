{% extends 'base.html' %}

{% block content %}

<h2>Create RFQ</h2>

<div class="card shadow">

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label>RFQ Title</label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Description</label>

                <textarea
                    name="description"
                    class="form-control">
                </textarea>

            </div>

            <div class="mb-3">

                <label>Quantity</label>

                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label>Deadline</label>

                <input
                    type="date"
                    name="deadline"
                    class="form-control">

            </div>

            <div class="mb-3">

                <label>Assign Vendor</label>

                <select
                    name="vendor_id"
                    class="form-control">

                    {% for vendor in vendors %}

                    <option value="{{ vendor.id }}">
                        {{ vendor.vendor_name }}
                    </option>

                    {% endfor %}

                </select>

            </div>

            <button
                class="btn btn-success">

                Create RFQ

            </button>

        </form>

    </div>

</div>

{% endblock %}
